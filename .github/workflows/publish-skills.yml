name: Publish Skills

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-skills:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install GitHub CLI skill extension
        env:
          GH_TOKEN: ${{ secrets.GH_PUBLISH_TOKEN || github.token }}
        run: gh extension install github/gh-skill

      - name: Publish skills to GitHub
        env:
          GH_TOKEN: ${{ secrets.GH_PUBLISH_TOKEN || github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh skill publish
